# Kitty - Catppuccin Mocha Lavender
# Place at ~/.config/kitty/kitty.conf

# === Font ===
font_family      Maple Mono NF
#bold_font        JetBrainsMono Nerd Font Bold
#italic_font      JetBrainsMono Nerd Font Italic
#bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0
#font_features    JetBrainsMono-Regular +liga +calt

# === Cursor ===
cursor_shape           block
cursor_blink_interval  0
cursor                 #b4befe
cursor_text_color      #1e1e2e

# === Scrollback ===
scrollback_lines 5000

# === Mouse ===
url_color              #b4befe
url_style              single
open_url_with          default
copy_on_select         no

# === Window ===
window_padding_width   10
hide_window_decorations yes
confirm_os_window_close 0

# === Tab bar ===
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_background     #11111b
tab_active_background  #b4befe
tab_active_foreground  #1e1e2e
tab_inactive_background #313244
tab_inactive_foreground #a6adc8
tab_title_template     " {title} "

# === Bell ===
enable_audio_bell no
visual_bell_duration 0.0

# === Colors: Catppuccin Mocha ===
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #b4befe

# Black
color0  #45475a
color8  #585b70

# Red
color1  #f38ba8
color9  #f38ba8

# Green
color2  #a6e3a1
color10 #a6e3a1

# Yellow
color3  #f9e2af
color11 #f9e2af

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta / Mauve
color5  #cba6f7
color13 #cba6f7

# Cyan / Teal
color6  #94e2d5
color14 #94e2d5

# White
color7  #bac2de
color15 #a6adc8

# === Keybindings ===
# New tab
map ctrl+shift+t new_tab_with_cwd
# Close tab
map ctrl+shift+w close_tab
# Navigate tabs
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
# New window split
map ctrl+shift+enter new_window_with_cwd
# Navigate windows
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
# Scrollback
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down
# Increase/decrease font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

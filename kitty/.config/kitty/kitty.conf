# Kitty - Gruvbox Dark Hard
# Place at ~/.config/kitty/kitty.conf

# === Font ===
# font_family      Maple Mono NF
font_family       JetBrainsMono Nerd Font
#bold_font        JetBrainsMono Nerd Font Bold
#italic_font      JetBrainsMono Nerd Font Italic
#bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0
#font_features    JetBrainsMono-Regular +liga +calt

# === Cursor ===
cursor_shape           block
cursor_blink_interval  0
cursor                 #928374
cursor_text_color      #1d2021

# === Scrollback ===
scrollback_lines 5000

# === Mouse ===
url_color              #83a598
url_style              single
open_url_with          default
copy_on_select         no

# === Window ===
window_padding_width   10
hide_window_decorations yes
confirm_os_window_close 0

# === Tab bar ===
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_background     #1d2021
tab_active_background  #8ec07c
tab_active_foreground  #1d2021
tab_inactive_background #3c3836
tab_inactive_foreground #a89984
tab_title_template     " {title} "

# === Bell ===
enable_audio_bell no
visual_bell_duration 0.0

# === Colors: Gruvbox Dark Hard ===
foreground              #ebdbb2
background              #1d2021
selection_foreground    #1d2021
selection_background    #ebdbb2

# Black
color0  #665c54
color8  #7c6f64

# Red
color1  #cc241d
color9  #fb4934

# Green
color2  #98971a
color10 #b8bb26

# Yellow
color3  #d79921
color11 #fabd2f

# Blue
color4  #458588
color12 #83a598

# Magenta / Purple
color5  #b16286
color13 #d3869b

# Cyan / Aqua
color6  #689d6a
color14 #8ec07c

# White
color7  #a89984
color15 #bdae93

# === Keybindings ===
# New tab
map ctrl+shift+t new_tab_with_cwd
# Close tab
map ctrl+shift+w close_tab
# Navigate tabs
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
# New window split
map ctrl+shift+enter new_window_with_cwd
# Navigate windows
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
# Scrollback
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down
# Increase/decrease font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

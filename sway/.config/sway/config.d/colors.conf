# Gruvbox Dark Hard - Sway Colors
# To include in your sway config.d, save as ~/.config/sway/config.d/colors.conf

# Gruvbox Dark Hard palette
set $bg        #1d2021
set $bg0       #282828
set $bg1       #3c3836
set $bg2       #504945
set $bg3       #665c54
set $bg4       #7c6f64
set $fg        #ebdbb2
set $fg0       #fbf1c7
set $fg1       #ebdbb2
set $fg2       #d5c4a1
set $fg3       #bdae93
set $fg4       #a89984
set $red       #fb4934
set $green     #b8bb26
set $yellow    #fabd2f
set $blue      #83a598
set $purple    #d3869b
set $aqua      #8ec07c
set $orange    #fe8019
set $gray      #928374
set $darkgray  #3c3836

# Window colors           border     background  text      indicator  child_border
client.focused            $aqua      $bg        $fg       $aqua      $aqua
client.focused_inactive   $bg2       $bg        $fg4      $bg2       $bg2
client.unfocused          $bg1       $bg        $gray     $bg1       $bg1
client.urgent             $red       $bg        $fg       $red       $red
client.placeholder        $bg1       $bg        $fg       $bg1       $bg1
client.background         $bg

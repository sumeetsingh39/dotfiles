# Qt Theming Environment Variables
# Place at ~/.config/sway/config.d/qt-env.conf
# This ensures all Qt5 and Qt6 apps use Kvantum + qt5ct/qt6ct

# Use qt5ct for Qt5 apps (vlc, qbittorrent, etc.)
set $env_qt5 QT_QPA_PLATFORMTHEME=qt5ct

# Use qt6ct for Qt6 apps
set $env_qt6 QT6_QPA_PLATFORMTHEME=qt6ct

# Force Wayland for Qt apps (better rendering, no XWayland blurriness)
set $env_qtwayland QT_QPA_PLATFORM=wayland

# Disable Qt's own DPI scaling (let the compositor handle it)
set $env_qtdpi QT_AUTO_SCREEN_SCALE_FACTOR=1

# Scale factor - set to 1 for ThinkPad X9, adjust if screen feels too small/large
set $env_qtscale QT_SCALE_FACTOR=1

# Kvantum platform theme
set $env_kvantum KVANTUM_THEME=catppuccin-mocha-lavender

exec systemctl --user import-environment \
    QT_QPA_PLATFORMTHEME \
    QT6_QPA_PLATFORMTHEME \
    QT_QPA_PLATFORM \
    QT_AUTO_SCREEN_SCALE_FACTOR \
    QT_SCALE_FACTOR \
    KVANTUM_THEME

# Fuzzel - Gruvbox Dark Hard
# Place at ~/.config/fuzzel/fuzzel.ini

[main]
font=JetBrainsMono Nerd Font:size=13
dpi-aware=auto
prompt=
icon-theme=Gruvbox-Plus-Dark
icons-enabled=yes
terminal=kitty
layer=overlay
exit-on-keyboard-focus-loss=yes
use-bold=yes
width=35
horizontal-pad=16
vertical-pad=10
inner-pad=6
lines=10
line-height=24
letter-spacing=0
image-size-ratio=0.5
anchor=center

[colors]
# Gruvbox Dark Hard
background=1d2021ee
text=ebdbb2ff
match=8ec07cff
selection=504945ff
selection-text=ebdbb2ff
selection-match=8ec07cff
border=8ec07cff
placeholder=928374ff

[border]
width=2
radius=8

[dmenu]
mode=text

[key-bindings]
cancel=Escape BackSpace
execute=Return KP_Enter
execute-or-next=Tab
cursor-left=Left Control+b
cursor-right=Right Control+f
cursor-home=Home Control+a
cursor-end=End Control+e
delete-prev=BackSpace
delete-line=Control+k
prev=Up Control+p
next=Down Control+n

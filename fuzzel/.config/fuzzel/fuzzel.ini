# Fuzzel - Catppuccin Mocha Lavender
# Place at ~/.config/fuzzel/fuzzel.ini

[main]
font=JetBrainsMono Nerd Font:size=14
dpi-aware=auto
prompt= 
icon-theme=Papirus-Dark
icons-enabled=yes
terminal=kitty
layer=overlay
exit-on-keyboard-focus-loss=yes
use-bold=yes
width=35
horizontal-pad=16
vertical-pad=10
inner-pad=6
lines=10
line-height=24
letter-spacing=0
image-size-ratio=0.5
anchor=center

[colors]
# Catppuccin Mocha Lavender
background=1e1e2eee
text=cdd6f4ff
match=b4befeff
selection=313244ff
selection-text=cdd6f4ff
selection-match=b4befeff
border=b4befeff
placeholder=6c7086ff

[border]
width=2
radius=8

[dmenu]
mode=text

[key-bindings]
cancel=Escape BackSpace
execute=Return KP_Enter
execute-or-next=Tab
cursor-left=Left Control+b
cursor-right=Right Control+f
cursor-home=Home Control+a
cursor-end=End Control+e
delete-prev=BackSpace
delete-line=Control+k
prev=Up Control+p
next=Down Control+n

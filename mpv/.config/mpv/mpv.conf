# --- Window & Display ---
#fullscreen=yes                  # Start in fullscreen
keep-open=yes                   # Don't close the player after the video ends
cursor-autohide=1000            # Hide cursor after 1 second

# --- Audio & Volume ---
volume=60                       # Starting volume (a "normal" level)
volume-max=150                  # Allow boosting volume up to 150%
save-position-on-quit=yes       # Remember where you left off (and volume/subs)
watch-later-options=volume,mute,edition,vid,aid,sid

# --- Subtitles ---
sub-auto=all                    # Load all subs containing the movie name
sub-font='Wotfard'       # Change this to a font installed on your system
sub-font-size=35
sub-color='#FFFFFFFF'           # White text
sub-border-color='#FF000000'    # Black outline
sub-border-size=2
sub-shadow-offset=1
sub-shadow-color='#33000000'
sub-spacing=0.5

# --- OSD (On Screen Display) ---
osd-font='Wotfard'         # Match this with your sub font for consistency
osd-font-size=32
osd-color='#CCFFFFFF'           # Slightly transparent white
osd-border-color='#99000000'    # Slightly transparent black
osd-bar-align-y=0.8             # Progress bar position (0 is center, 1 is bottom)
osd-bar-h=2
osd-bar-w=60

# --- Video Quality (The "Sane" Defaults) ---
vo=gpu
profile=gpu-hq                  # High quality playback without extreme overhead
hwdec=auto-safe                 # Enable hardware decoding if available

